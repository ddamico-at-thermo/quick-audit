<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Auditor Tool</title>
    <!-- React & Babel for in-browser JSX transformation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        iframe { background: white; }
        .kbd { 
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            padding: 1px 4px;
            font-size: 10px;
            font-family: monospace;
            box-shadow: 0 1px 0 #cbd5e1;
        }
    </style>
</head>
<body class="bg-slate-50 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                if (window.lucide) {
                    const iconNode = window.lucide.icons[name];
                    if (iconNode) {
                        const parts = iconNode.map(([tag, attrs]) => {
                            const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                            return `<${tag} ${attrStr}></${tag}>`;
                        }).join('');
                        setSvg(parts);
                    }
                }
            }, [name]);

            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                    dangerouslySetInnerHTML={{ __html: svg }}
                />
            );
        };

        const App = () => {
            const [items, setItems] = useState([]);
            const [originalHeaders, setOriginalHeaders] = useState([]);
            const [metaRows, setMetaRows] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [searchTerm, setSearchTerm] = useState('');
            const [auditSearchTerm, setAuditSearchTerm] = useState('Orbitrap Exploris, Excedion');
            const [autoHighlight, setAutoHighlight] = useState(false);
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [inputMode, setInputMode] = useState('upload');
            const [pastedUrls, setPastedUrls] = useState('');

            const ACTION_COL_NAME = "Action: Add Orbitrap IUS Yes or No";

            const parseCSVLine = (line) => {
                const result = [];
                let cur = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        if (inQuotes && line[i + 1] === '"') {
                            cur += '"'; i++;
                        } else {
                            inQuotes = !inQuotes;
                        }
                    } else if (char === ',' && !inQuotes) {
                        result.push(cur.trim());
                        cur = '';
                    } else {
                        cur += char;
                    }
                }
                result.push(cur.trim());
                return result;
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const text = event.target.result;
                    const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
                    let headerIdx = lines.findIndex(line => line.toLowerCase().includes('url') && line.toLowerCase().includes('title'));
                    if (headerIdx === -1) return;

                    const headers = parseCSVLine(lines[headerIdx]);
                    if (!headers.includes(ACTION_COL_NAME)) headers.push(ACTION_COL_NAME);

                    const meta = lines.slice(0, headerIdx);
                    const dataRows = lines.slice(headerIdx + 1);

                    const newItems = dataRows.map((line, index) => {
                        const values = parseCSVLine(line);
                        const rowData = {};
                        headers.forEach((h, i) => rowData[h] = values[i] || '');
                        const existingStatus = rowData[ACTION_COL_NAME]?.toLowerCase();
                        return {
                            id: Date.now() + index,
                            url: rowData['URL'] || '',
                            status: existingStatus === 'yes' ? 'yes' : existingStatus === 'no' ? 'no' : 'pending',
                            originalData: rowData
                        };
                    }).filter(item => item.url);

                    setMetaRows(meta);
                    setOriginalHeaders(headers);
                    setItems(newItems);
                    setCurrentIndex(0);
                };
                reader.readAsText(file);
            };

            const handlePasteSubmit = () => {
                const urls = pastedUrls.split(/\r?\n/).map(u => u.trim()).filter(u => u !== '');
                if (urls.length === 0) return;

                const headers = ["Title", "URL", ACTION_COL_NAME];
                const newItems = urls.map((url, index) => ({
                    id: Date.now() + index,
                    url: url.startsWith('http') ? url : `https://${url}`,
                    status: 'pending',
                    originalData: { "Title": url, "URL": url }
                }));

                setMetaRows([]);
                setOriginalHeaders(headers);
                setItems(newItems);
                setCurrentIndex(0);
                setPastedUrls('');
                setInputMode('upload');
            };

            const markStatus = (id, status) => {
                setItems(prev => prev.map(item => item.id === id ? { ...item, status } : item));
                if (items[currentIndex]?.id === id && currentIndex < items.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                }
            };

            const exportCSV = () => {
                if (items.length === 0) return;
                const csvRows = [...metaRows];
                csvRows.push(originalHeaders.map(h => `"${h}"`).join(','));
                items.forEach(item => {
                    const rowValues = originalHeaders.map(h => {
                        if (h === ACTION_COL_NAME) return item.status === 'yes' ? '"Yes"' : item.status === 'no' ? '"No"' : '""';
                        return `"${(item.originalData[h] || '').replace(/"/g, '""')}"`;
                    });
                    csvRows.push(rowValues.join(','));
                });
                const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.setAttribute("download", `audit_results_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const filteredItems = useMemo(() => {
                return items.filter(item => item.url.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [items, searchTerm]);

            const currentItem = items[currentIndex];

            const iframeUrl = useMemo(() => {
                if (!currentItem) return '';
                if (!autoHighlight || !auditSearchTerm) return currentItem.url;
                
                try {
                    const url = new URL(currentItem.url);
                    const term = auditSearchTerm.split(',')[0].trim();
                    url.searchParams.set('q', term);
                    url.searchParams.set('highlight', term);
                    return url.toString();
                } catch (e) {
                    return currentItem.url;
                }
            }, [currentItem, autoHighlight, auditSearchTerm]);

            return (
                <div className="flex h-screen w-full bg-slate-50 overflow-hidden text-slate-900 text-sm">
                    <div className={`${sidebarOpen ? 'w-1/3 min-w-[320px]' : 'w-12'} flex flex-col border-r bg-white transition-all duration-300 relative shrink-0 shadow-xl z-20`}>
                        <button onClick={() => setSidebarOpen(!sidebarOpen)} className="absolute -right-3 top-12 bg-white border rounded-full p-1 z-30 hover:bg-slate-100 shadow-md">
                            <Icon name={sidebarOpen ? "ChevronLeft" : "ChevronRight"} size={16} />
                        </button>
                        {sidebarOpen && (
                            <div className="flex flex-col h-full">
                                <div className="p-4 border-b space-y-4 bg-white">
                                    <div className="flex items-center justify-between">
                                        <h1 className="text-xl font-bold flex items-center gap-2">
                                            <Icon name="LayoutGrid" className="text-blue-600" /> Auditor
                                        </h1>
                                        <div className="flex gap-1">
                                            <button onClick={exportCSV} className="p-2 hover:bg-green-50 text-green-700 rounded-md transition-colors" title="Export CSV"><Icon name="Download" size={20} /></button>
                                            <button onClick={() => { if(confirm('Clear all?')) setItems([]); }} className="p-2 hover:bg-red-50 text-red-600 rounded-md transition-colors" title="Clear All"><Icon name="Trash2" size={20} /></button>
                                        </div>
                                    </div>
                                    <div className="flex bg-slate-100 p-1 rounded-lg">
                                        <button onClick={() => setInputMode('upload')} className={`flex-1 py-1 text-[10px] font-bold uppercase rounded-md transition-all ${inputMode === 'upload' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>CSV Upload</button>
                                        <button onClick={() => setInputMode('paste')} className={`flex-1 py-1 text-[10px] font-bold uppercase rounded-md transition-all ${inputMode === 'paste' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>Paste URLs</button>
                                    </div>
                                    {inputMode === 'upload' ? (
                                        <label className="flex items-center justify-center gap-2 w-full py-2 border-2 border-dashed border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 cursor-pointer transition-all">
                                            <Icon name="Upload" size={16} className="text-slate-400" />
                                            <span className="text-xs font-medium text-slate-600">Upload SiteImprove CSV</span>
                                            <input type="file" accept=".csv" onChange={handleFileUpload} className="hidden" />
                                        </label>
                                    ) : (
                                        <div className="space-y-2">
                                            <textarea className="w-full h-24 p-2 text-[11px] border rounded-md font-mono focus:ring-1 focus:ring-blue-500" placeholder="Paste one URL per line..." value={pastedUrls} onChange={(e) => setPastedUrls(e.target.value)} />
                                            <button onClick={handlePasteSubmit} className="w-full py-2 bg-blue-600 text-white rounded-md text-xs font-bold hover:bg-blue-700 transition-colors">Start Audit</button>
                                        </div>
                                    )}
                                    <div className="relative">
                                        <Icon name="Search" className="absolute left-2 top-2 text-slate-400" size={14} />
                                        <input type="text" placeholder="Filter list..." className="w-full pl-8 pr-2 py-1 text-xs border rounded-md" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                    </div>
                                </div>
                                <div className="flex-grow overflow-y-auto p-2 space-y-1 bg-slate-50">
                                    {filteredItems.map((item, idx) => {
                                        const globalIdx = items.findIndex(i => i.id === item.id);
                                        return (
                                            <div key={item.id} onClick={() => setCurrentIndex(globalIdx)} className={`group flex items-center justify-between p-2 rounded-md cursor-pointer border transition-all ${currentIndex === globalIdx ? 'bg-blue-50 border-blue-200 shadow-sm' : 'bg-white border-transparent hover:border-slate-300'}`}>
                                                <div className="flex flex-col min-w-0 pr-2">
                                                    <span className="text-[10px] text-slate-400 font-bold uppercase truncate">{item.originalData['Title'] || 'Untitled'}</span>
                                                    <span className={`text-[11px] font-mono truncate ${currentIndex === globalIdx ? 'text-blue-700' : 'text-slate-500'}`}>{item.url}</span>
                                                </div>
                                                {item.status !== 'pending' && <span className={`shrink-0 h-5 w-5 flex items-center justify-center rounded-full text-[10px] font-bold ${item.status === 'yes' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{item.status === 'yes' ? 'Y' : 'N'}</span>}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="flex-grow flex flex-col bg-slate-100 min-w-0">
                        {!currentItem ? (
                            <div className="flex-grow flex items-center justify-center text-slate-400 flex-col gap-4">
                                <div className="p-8 bg-white rounded-2xl shadow-xl flex flex-col items-center gap-4">
                                    <Icon name="FileText" size={48} className="text-blue-100" />
                                    <div className="text-center">
                                        <p className="text-slate-600 font-bold">Audit Queue Empty</p>
                                        <p className="text-slate-400 text-sm">Upload a file or paste URLs to begin.</p>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <>
                                <div className="bg-white border-b p-3 flex items-center justify-between shadow-sm z-10">
                                    <div className="flex items-center gap-4 min-w-0 flex-grow">
                                        <div className="flex items-center gap-1 shrink-0">
                                            <button onClick={() => setCurrentIndex(Math.max(0, currentIndex - 1))} className="p-2 hover:bg-slate-100 rounded"><Icon name="ChevronLeft" size={20} /></button>
                                            <span className="text-xs font-bold text-slate-400 w-12 text-center">{currentIndex + 1} / {items.length}</span>
                                            <button onClick={() => setCurrentIndex(Math.min(items.length - 1, currentIndex + 1))} className="p-2 hover:bg-slate-100 rounded"><Icon name="ChevronRight" size={20} /></button>
                                        </div>
                                        <div className="flex flex-col gap-2 flex-grow max-w-md">
                                            <div className="flex items-center gap-2 bg-amber-50 border border-amber-200 px-3 py-1.5 rounded-lg">
                                                <Icon name="Info" size={14} className="text-amber-500 shrink-0" />
                                                <div className="flex flex-col flex-grow min-w-0">
                                                    <span className="text-[9px] font-bold text-amber-600 uppercase tracking-tighter">Scanning for:</span>
                                                    <input type="text" value={auditSearchTerm} onChange={(e) => setAuditSearchTerm(e.target.value)} className="bg-transparent text-xs font-semibold text-amber-900 border-none focus:outline-none w-full p-0 leading-tight" placeholder="Enter terms..."/>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-3 px-1">
                                                <label className="flex items-center gap-1.5 cursor-pointer group">
                                                    <input type="checkbox" checked={autoHighlight} onChange={(e) => setAutoHighlight(e.target.checked)} className="w-3 h-3 rounded text-blue-600" />
                                                    <span className="text-[10px] text-slate-500 group-hover:text-slate-700">Auto-append ?q=term</span>
                                                </label>
                                                <div className="text-[10px] text-slate-400 flex items-center gap-1 ml-auto"><span>Focus + </span><span className="kbd">Ctrl</span><span className="kbd">F</span></div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4 shrink-0 ml-4 border-l pl-4">
                                        <div className="flex flex-col items-end mr-2 hidden lg:flex text-right">
                                           <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Orbitrap IUS?</span>
                                           <span className="text-[9px] text-slate-400 italic">Auto-advances</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => markStatus(currentItem.id, 'yes')} className={`flex items-center gap-2 px-6 md:px-8 py-2 md:py-3 rounded-xl font-black transition-all shadow-md ${currentItem.status === 'yes' ? 'bg-green-600 text-white ring-4 ring-green-100' : 'bg-white text-green-700 border-2 border-green-600'}`}>
                                                <Icon name="CheckCircle2" size={18} /> <span className="hidden sm:inline">YES</span>
                                            </button>
                                            <button onClick={() => markStatus(currentItem.id, 'no')} className={`flex items-center gap-2 px-6 md:px-8 py-2 md:py-3 rounded-xl font-black transition-all shadow-md ${currentItem.status === 'no' ? 'bg-red-600 text-white ring-4 ring-red-100' : 'bg-white text-red-700 border-2 border-red-600'}`}>
                                                <Icon name="XCircle" size={18} /> <span className="hidden sm:inline">NO</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-slate-800 text-white px-4 py-1.5 flex items-center justify-between shrink-0">
                                    <div className="flex items-center gap-3 overflow-hidden min-w-0">
                                        <span className="text-[10px] font-bold text-slate-400 uppercase shrink-0">Current Page:</span>
                                        <span className="text-xs font-medium truncate italic text-slate-300">{currentItem.originalData['Title']}</span>
                                    </div>
                                    <div className="flex items-center gap-3 shrink-0 ml-4">
                                        <a href={currentItem.url} target="_blank" rel="noreferrer" className="text-blue-400 hover:text-blue-300"><Icon name="ExternalLink" size={14} /></a>
                                    </div>
                                </div>
                                <div className="flex-grow bg-white">
                                    <iframe key={currentItem.id + (autoHighlight ? '_h' : '_n')} src={iframeUrl} className="w-full h-full border-none" title="Audit View" />
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
